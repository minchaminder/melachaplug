#--------------------------------------------
#---------------- Plug Info -----------------
#--------------------------------------------
switch:
  - platform: gpio
    name: 20 Relay 1
    id: relay_1
    pin:
      number: ${relay_1_gpio}
    restore_mode: ${relay_restore_mode}  # defaults to on
    on_turn_on:
      then:
        - switch.turn_on: built_in_led
    on_turn_off:
      then:
        - switch.turn_off: built_in_led

  # switch which can disable the button
  - platform: gpio
    pin:
      number: ${button_1_gpio}
      allow_other_uses: true
    name: 21 Enable Button 1
    id: enable_button_1
    internal: true
    inverted: false
    restore_mode: ALWAYS_OFF         # defaults to off in case of reset on Shabbos or Yom Tov

  # LED flash preset
  - platform: template
    name: 22 Flash LED
    id: flash_led
    disabled_by_default: true
    optimistic: yes
    restore_mode: DISABLED
    on_turn_on:
    - while:
        condition:
          switch.is_on: flash_led
        then:
        - switch.turn_on: built_in_led
        - delay: 75ms
        - switch.turn_off: built_in_led
        - delay: 75ms
        - switch.turn_on: built_in_led
        - delay: 75ms
        - switch.turn_off: built_in_led
        - delay: 2875ms
    on_turn_off:
    - switch.turn_off: built_in_led

  - platform: gpio
    name: 23 Built-in LED
    disabled_by_default: true
    id: built_in_led
    pin:
      number: ${built_in_led_gpio}
    restore_mode: ${relay_restore_mode}    # defaults to the same as the relay
    inverted: ${led_inverted}

# Hold the physical button ~10s to enter WiFi setup (fallback AP + captive portal).
# Short click still toggles the relay. 10s is intentional so it cannot be done by accident.
script:
  - id: enter_wifi_setup
    mode: single
    then:
      - logger.log: "WiFi setup: starting fallback AP / captive portal"
      - switch.turn_on: flash_led
      - lambda: |-
          // Clear captive-portal saved credentials and force the fallback AP.
          // Works for preflashed units that have no compile-time WiFi SSID/password.
          id(wifi_sta).set_ap_timeout(1);
          id(wifi_sta).disable();
          id(wifi_sta).clear_sta();
          id(wifi_sta).enable();

binary_sensor:
  - platform: gpio
    id: button_1
    pin:
      number: ${button_1_gpio}
      mode: INPUT_PULLUP
      allow_other_uses: true
      inverted: true
    filters:
      - delayed_on: 10ms
    on_press:
      # After 8s of holding, blink once as a "keep holding" cue
      - delay: 8s
      - if:
          condition:
            binary_sensor.is_on: button_1
          then:
            - logger.log: "WiFi setup: keep holding to confirm..."
            - switch.turn_on: built_in_led
            - delay: 150ms
            - switch.turn_off: built_in_led
    on_click:
      # Normal use: short press toggles the relay
      - min_length: 50ms
        max_length: 2s
        then:
          - switch.toggle: relay_1
      # Deliberate gesture: hold 10-60s -> WiFi setup AP
      - min_length: 10s
        max_length: 60s
        then:
          - script.execute: enter_wifi_setup
